# プロペラの基本設定
propeller:
  name: "sample"   # プロペラの名前（出力フォルダ名に使用）
  B: 2               # ブレード数
  R: 1.5             # 半径 [m]
  Rhub: 0.1          # ハブ半径 [m]

# 設計条件
design_point:
  V: 7.4             # 設計飛行速度 [m/s]
  RPM: 135           # 回転数 [rpm]
  target: thrust      # 最適化の目標（power または thrust）
  value: 24         # パワー(W) または 推力(N) の値
  CL: 0.5            # 設計揚力係数（HPA向け翼型の場合は 0.5 〜 0.8 程度）

# 環境データ
environment:
  rho: 1.225         # 空気密度 [kg/m^3]
  visc: 1.46e-5      # 動粘性係数 [m^2/s]

# 解析・XFOIL設定
analysis:
  n_stations: 5      # 設計する翼素の数（動作確認: 5、実設計: 20〜30 推奨）
  ncrit: 9.0         # 乱れ度合いの指標 (典型的な風洞環境で9.0)
  iter: 100          # 粘性計算の最大イテレーション
  design_iters: 2    # 設計反復回数（翼型ブレンド→XROTOR設計→再ブレンドの繰り返し数）
  cleanup_temp: true # 設計完了後に temp_work/ を自動削除するか
  xfoil_timeout: 60  # XFOIL プロセス1ステーション当たりのタイムアウト秒数
  xrotor_timeout: 60 # XROTOR 実行のタイムアウト秒数
  n_xfoil_workers: 4 # XFOIL 並列プロセス数（初期設計計算の高速化、設定は n_stations 以下推奨）
  alpha_seq:         # 迎角のスイープ設定
    - "ASEQ 0 10 1.0"
    - "ASEQ 0 -5 -1.0"
  j_sweep:           # オフデザイン解析のアドバンスレシオ(J)スイープ設定
    j_margin_low: 0.4   # 設計Jからの下マージン（J_min = J_design - j_margin_low）
    j_margin_high: 0.5  # 設計Jからの上マージン（J_max = J_design + j_margin_high）
    j_step: 0.05        # スイープのステップ幅
  vrpm_sweep:        # V-RPM 効率マップのスイープ設定
    v_margin: 3.0       # 設計速度からの前後マージン [m/s]
    rpm_margin: 40.0    # 設計RPMからの前後マージン [rpm]
    n_points: 15        # 各軸の格子点数（合計 n_points^2 点を解析）
    n_workers: 4        # 並列 XROTOR プロセス数（解析高速化）

# 翼型のブレンド定義
airfoils:
  - r_R: 0.1         # 根元（ハブ）付近
    file: "airfoils/GEMINI.dat"  # 根元から使用
  - r_R: 1.0         # 先端
    file: "airfoils/DAE51.dat"
