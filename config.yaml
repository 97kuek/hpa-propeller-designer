# プロペラの基本設定
propeller:
  name: "sample"   # プロペラの名前（出力フォルダ名に使用）
  B: 2               # ブレード数
  R: 1.5             # 半径 [m]
  Rhub: 0.1          # ハブ半径 [m]

# 設計条件
design_point:
  V: 7.4             # 設計飛行速度 [m/s]
  RPM: 135           # 回転数 [rpm]
  target: thrust      # 最適化の目標（power または thrust）
  value: 24         # パワー(W) または 推力(N) の値
  CL: 0.5            # 設計揚力係数（HPA向け翼型の場合は 0.5 〜 0.8 程度）

# 環境データ
environment:
  rho: 1.225         # 空気密度 [kg/m^3]
  visc: 1.46e-5      # 動粘性係数 [m^2/s]

# 解析・XFOIL設定
analysis:
  n_stations: 5     # 設計する翼素の数（分割数）
  ncrit: 9.0         # 乱れ度合いの指標 (典型的な風洞環境で9.0)
  iter: 100          # 粘性計算の最大イテレーション
  alpha_seq:         # 迎角のスイープ設定
    - "ASEQ 0 10 1.0"
    - "ASEQ 0 -5 -1.0"

# 翼型のブレンド定義
airfoils:
  - r_R: 0.1         # 根元（ハブ）付近
    file: "airfoils/GEMINI.dat"  # 根元から使用
  - r_R: 1.0         # 先端
    file: "airfoils/DAE51.dat"
